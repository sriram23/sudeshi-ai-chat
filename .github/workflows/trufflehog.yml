name: TruffleHog
on: [push, pull_request]

jobs:
    trufflehog:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Run TruffleHog OSS
              uses: trufflesecurity/trufflehog@v3.95.5
              with:
                path: ./
                base: ${{ github.event.repository.default_branch }}
                head: HEAD