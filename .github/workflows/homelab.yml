name: Homelab Deployment
on:
    push:
        branches:
            - main
    workflow_dispatch:
permissions:
    contents: read
    packages: write
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Docker Login
              uses: docker/login-action@v4.4.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ github.token }}
            - name: Build Image
              run: docker build -t ghcr.io/${{github.repository_owner}}/sudeshi:v1 .
            - name: Push Image
              run: docker push ghcr.io/${{github.repository_owner}}/sudeshi:v1
    deploy:
        runs-on: self-hosted
        needs: build
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Docker Login
              uses: docker/login-action@v4.4.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ github.token }}
            - name: Deploy
              run: |
                chmod +x ./scripts/deploy.sh
                ./scripts/deploy.sh