name: Testing
on: pull_request
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Install Node
              uses: actions/setup-node@v3
              with:
                  node-version: 24
            - name: Install dependencies
              run: npm ci
            - name: Run tests
              run: npm run test
