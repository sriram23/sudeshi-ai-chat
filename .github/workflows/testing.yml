name: Testing
on: pull_request
jobs:
    test:
        permissions:
            contents: read
            pull-requests: write
            issues: write
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install dependencies
              run: npm install

            - name: Run tests
              run: |
                npm run test > test.txt 2>&1 || true

            - name: Comment
              if: always()
              uses: actions/github-script@v9
              with:
                script: |
                    const fs = require("fs");

                    let result =
                        fs.readFileSync("test.txt", "utf8");
                        result = result.slice(0, 60000);

                    const body =
                        "## Test Result \n\n```\n" +
                        result +
                        "\n```\n";

                    await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                        body: `## Test Result\n\n\`\`\`\n${result}\n\`\`\``
                    })
